<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neighborhoods — Linju Find</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        /* ── Toolbar ── */
        .nbh-toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .nbh-search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 320px;
        }
        .nbh-search-wrap svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        .nbh-search-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 8px;
            padding: 0.6rem 1rem 0.6rem 2.3rem;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.84rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 150ms, background 150ms;
        }
        .nbh-search-input::placeholder { color: var(--text-muted); }
        .nbh-search-input:focus {
            border-color: var(--gold-500);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
        }
        .nbh-toolbar-label {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .nbh-sort-btn {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.48rem 0.9rem;
            border-radius: 7px;
            border: 1px solid rgba(201,168,76,0.22);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: color 150ms, border-color 150ms, background 150ms;
            white-space: nowrap;
        }
        .nbh-sort-btn:hover { color: var(--gold-400); border-color: var(--gold-500); }
        .nbh-sort-btn.asc,
        .nbh-sort-btn.desc {
            color: var(--charcoal-950);
            background: var(--gold-500);
            border-color: var(--gold-500);
        }
        .sort-arrow { font-size: 0.7rem; }
        .nbh-count-badge {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── City section ── */
        .nbh-city-section {
            margin-bottom: 2.5rem;
        }
        .nbh-city-header {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            margin-bottom: 1.25rem;
        }
        .nbh-city-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gold-400);
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.24);
            border-radius: 999px;
            padding: 0.3rem 1rem;
            white-space: nowrap;
        }
        .nbh-city-pill__pinyin {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .nbh-city-pill__hanzi {
            font-family: 'Noto Serif SC', 'Noto Serif', serif;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: rgba(212,175,95,0.8);
        }
        .nbh-city-pill__sep {
            width: 1px;
            height: 0.75rem;
            background: rgba(201,168,76,0.3);
            flex-shrink: 0;
        }
        .nbh-city-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right,
                rgba(201,168,76,0.25),
                rgba(201,168,76,0.0)
            );
        }
        .nbh-city-count {
            font-size: 0.62rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ── Neighborhood card (reuses lf-nbh-grid sizing) ── */
        .nbh-city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }
    </style>
</head>
<body>

<nav class="lf-nav">
    <a th:href="@{/listings}" class="lf-nav__brand">
        <img th:src="@{/images/Navbar Wide Logo.png}" alt="Linju Find" class="lf-nav__brand-logo" width="140" height="46">
    </a>
    <ul class="lf-nav__links">
        <li><a th:href="@{/listings}">Listings</a></li>
        <li th:if="${session.loginUser.role != 'admin'}"><a th:href="@{/neighborhoods}">Neighborhoods</a></li>
        <li th:if="${session.loginUser.role != 'admin'}"><a th:href="@{/listings/add}">Post</a></li>
        <li th:if="${session.loginUser.role != 'admin'}"><a th:href="@{/listings/my}">My Listings</a></li>
        <li th:if="${session.loginUser.role == 'admin'}"><a th:href="@{/admin/dashboard}" style="color:var(--gold-400);font-weight:600;">Admin Panel</a></li>
        <li><a th:href="@{/logout}" class="lf-nav__logout">Logout</a></li>
    </ul>
</nav>

<div class="lf-page">
    <div class="lf-page-header lf-reveal">
        <p style="font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-500);">Community Ratings</p>
        <h2>Browse Neighborhoods</h2>
        <div class="lf-divider"></div>
        <p>Discover areas rated by real residents — safety, transport, food, and foreigner-friendliness.</p>
    </div>

    <!-- Hidden data source -->
    <div id="nbh-data" style="display:none;">
        <div th:each="n : ${neighborhoods}"
             class="nbh-row"
             th:data-id="${n.id}"
             th:data-name="${n.name}"
             th:data-city="${n.city}"
             th:data-description="${n.description}"
             th:data-href="@{/neighborhoods/{id}(id=${n.id})}"
             th:data-avg-safety="${n.avgSafety}"
             th:data-avg-transport="${n.avgTransport}"
             th:data-avg-food="${n.avgFoodAccess}"
             th:data-avg-foreigner="${n.avgForeignerFriendly}">
        </div>
    </div>

    <div th:if="${neighborhoods.isEmpty()}" class="lf-card">
        <p>No neighborhoods listed yet.</p>
    </div>

    <div th:if="${!neighborhoods.isEmpty()}" style="max-width:1200px;margin:0 auto;padding:0 2rem 3rem;">
        <!-- Toolbar -->
        <div class="nbh-toolbar" id="nbh-toolbar">
            <div class="nbh-search-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
                </svg>
                <input class="nbh-search-input" id="nbh-search"
                       type="text" placeholder="Search neighborhood or city…" autocomplete="off">
            </div>
            <span class="nbh-toolbar-label">Sort:</span>
            <button class="nbh-sort-btn" data-key="city">City <span class="sort-arrow"></span></button>
            <button class="nbh-sort-btn" data-key="name">Name <span class="sort-arrow"></span></button>
            <button class="nbh-sort-btn" data-key="avgScore">Avg Score <span class="sort-arrow"></span></button>
            <button class="nbh-sort-btn" data-key="avgSafety">Safety <span class="sort-arrow"></span></button>
            <button class="nbh-sort-btn" data-key="avgTransport">Transit <span class="sort-arrow"></span></button>
            <span class="nbh-count-badge" id="nbh-count"></span>
        </div>

        <!-- City-grouped sections rendered by JS -->
        <div id="nbh-sections"></div>
    </div>
</div>

<script th:src="@{/js/main.js(v=5)}"></script>
<script>
(function () {
    var rows = document.querySelectorAll('#nbh-data .nbh-row');
    if (!rows.length) return;

    function fmt(v) {
        if (v == null || v === '' || v === 'null') return null;
        return parseFloat(v);
    }

    var data = Array.from(rows).map(function (el) {
        var s  = fmt(el.dataset.avgSafety);
        var t  = fmt(el.dataset.avgTransport);
        var f  = fmt(el.dataset.avgFood);
        var fr = fmt(el.dataset.avgForeigner);
        var avg = (s != null && t != null && f != null && fr != null)
            ? (s + t + f + fr) / 4 : null;
        return {
            id:          el.dataset.id,
            name:        el.dataset.name,
            city:        el.dataset.city || 'Other',
            description: el.dataset.description,
            href:        el.dataset.href,
            avgSafety:    s,
            avgTransport: t,
            avgFood:      f,
            avgForeigner: fr,
            avgScore:     avg
        };
    });

    var sortKey = 'city', sortDir = 1;
    var searchQ = '';

    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function scoreRing(avg) {
        if (avg == null) return '';
        var pct = avg / 5;
        var r = 30, circ = 2 * Math.PI * r;
        var dash = pct * circ;
        return '<div class="lf-score-ring" style="position:relative;display:inline-flex;align-items:center;justify-content:center;">' +
            '<svg viewBox="0 0 72 72" width="64" height="64">' +
                '<circle cx="36" cy="36" r="30" fill="none" stroke="rgba(201,168,76,0.12)" stroke-width="5"/>' +
                '<circle cx="36" cy="36" r="30" fill="none" stroke="var(--gold-400)" stroke-width="5"' +
                    ' stroke-dasharray="'+dash+' '+circ+'"' +
                    ' stroke-dashoffset="'+(circ/4)+'"' +
                    ' stroke-linecap="round" transform="rotate(-90 36 36)"/>' +
            '</svg>' +
            '<div style="position:absolute;text-align:center;line-height:1;">' +
                '<span style="font-family:\'Cinzel\',serif;font-size:0.85rem;color:var(--gold-400);">'+avg.toFixed(1)+'</span>' +
                '<div style="font-size:0.5rem;color:var(--text-muted);">/ 5</div>' +
            '</div>' +
        '</div>';
    }

    function scoreItem(label, val) {
        if (val == null) return '';
        return '<div class="lf-nbh-score-item">' +
            '<div style="font-family:\'Cinzel\',serif;font-size:0.95rem;color:var(--gold-400);">'+val.toFixed(1)+'</div>' +
            '<div class="lf-nbh-score-item__label">'+esc(label)+'</div>' +
        '</div>';
    }

    function buildCard(n) {
        var hasScores = n.avgSafety != null;
        return '<div class="lf-card lf-card--link" onclick="window.location=\''+esc(n.href)+'\'" style="cursor:pointer;">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">' +
                '<div>' +
                    '<div style="font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.3rem;">'+esc(n.city)+'</div>' +
                    '<h3 style="font-size:1.1rem;">'+esc(n.name)+'</h3>' +
                '</div>' +
                (hasScores ? '<div>'+scoreRing(n.avgScore)+'</div>' : '') +
            '</div>' +
            '<p style="font-size:0.85rem;margin-bottom:1rem;">'+esc(n.description)+'</p>' +
            (hasScores
                ? '<div class="lf-nbh-card__scores">'+
                    scoreItem('Safety', n.avgSafety)+
                    scoreItem('Transit', n.avgTransport)+
                    scoreItem('Food', n.avgFood)+
                    scoreItem('Foreigner', n.avgForeigner)+
                  '</div>'
                : '<small>No ratings yet — be the first!</small>'
            ) +
            '<div class="lf-listing-card__arrow" style="margin-top:1rem;">' +
                'View &amp; Rate ' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">' +
                    '<path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>' +
                '</svg>' +
            '</div>' +
        '</div>';
    }

    function render() {
        var filtered = data.filter(function (n) {
            if (!searchQ) return true;
            return n.name.toLowerCase().indexOf(searchQ) !== -1 ||
                   n.city.toLowerCase().indexOf(searchQ) !== -1 ||
                   (n.description || '').toLowerCase().indexOf(searchQ) !== -1;
        });

        filtered.sort(function (a, b) {
            var va, vb;
            if (sortKey === 'avgScore' || sortKey === 'avgSafety' || sortKey === 'avgTransport') {
                va = a[sortKey] != null ? a[sortKey] : -Infinity;
                vb = b[sortKey] != null ? b[sortKey] : -Infinity;
                return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
            }
            va = String(a[sortKey] || '').toLowerCase();
            vb = String(b[sortKey] || '').toLowerCase();
            return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
        });

        var countEl = document.getElementById('nbh-count');
        if (countEl) countEl.textContent = filtered.length + ' of ' + data.length + ' neighborhoods';

        /* Group by city (in sorted order) */
        var cityMap = {}, cityOrder = [];
        filtered.forEach(function (n) {
            if (!cityMap[n.city]) { cityMap[n.city] = []; cityOrder.push(n.city); }
            cityMap[n.city].push(n);
        });

        var sectionsEl = document.getElementById('nbh-sections');
        if (!sectionsEl) return;
        sectionsEl.innerHTML = '';

        if (filtered.length === 0) {
            sectionsEl.innerHTML = '<div class="lf-card"><p>No neighborhoods match your search.</p></div>';
            return;
        }

        /* Pinyin → Hanzi lookup */
        var _cityHanziRaw = {
            'beijing':   '北京', 'shanghai':  '上海', 'nanjing':   '南京',
            'shenzhen':  '深圳', 'guangzhou': '广州', 'chengdu':   '成都',
            'chongqing': '重庆', 'hangzhou':  '杭州', 'wuhan':     '武汉',
            'xi\'an':    '西安', 'xian':      '西安', 'tianjin':   '天津',
            'suzhou':    '苏州', 'qingdao':   '青岛', 'dalian':    '大连',
            'kunming':   '昆明', 'xiamen':    '厦门', 'harbin':    '哈尔滨',
            'zhengzhou': '郑州', 'changsha':  '长沙', 'hefei':     '合肥',
            'fuzhou':    '福州', 'jinan':     '济南', 'shenyang':  '沈阳',
            'ningbo':    '宁波', 'wuxi':      '无锡', 'foshan':    '佛山',
            'nanchang':  '南昌', 'guiyang':   '贵阳', 'lanzhou':   '兰州',
            'yinchuan':  '银川', 'hohhot':    '呼和浩特', 'huhhot': '呼和浩特',
            'urumqi':    '乌鲁木齐', 'lhasa':  '拉萨', 'nanning':  '南宁',
            'haikou':    '海口', 'sanya':     '三亚', 'taiyuan':   '太原',
            'shijiazhuang': '石家庄', 'changchun': '长春'
        };
        function cityHanzi(c) { return _cityHanziRaw[c.toLowerCase()] || null; }

        cityOrder.forEach(function (city) {
            var group = cityMap[city];
            var section = document.createElement('div');
            section.className = 'nbh-city-section';

            var hanzi = cityHanzi(city);
            var pillInner = hanzi
                ? '<span class="nbh-city-pill__pinyin">'+esc(city)+'</span>' +
                  '<span class="nbh-city-pill__sep"></span>' +
                  '<span class="nbh-city-pill__hanzi">'+hanzi+'</span>'
                : esc(city);
            var header = '<div class="nbh-city-header">' +
                '<span class="nbh-city-pill">'+pillInner+'</span>' +
                '<div class="nbh-city-line"></div>' +
                '<span class="nbh-city-count">'+group.length+' neighborhood'+(group.length !== 1 ? 's' : '')+'</span>' +
            '</div>';

            var cardsHTML = '<div class="nbh-city-grid">' +
                group.map(buildCard).join('') +
            '</div>';

            section.innerHTML = header + cardsHTML;
            sectionsEl.appendChild(section);
        });
    }

    /* Sort buttons */
    document.querySelectorAll('#nbh-toolbar .nbh-sort-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            var key = btn.dataset.key;
            if (sortKey === key) { sortDir = -sortDir; }
            else { sortKey = key; sortDir = 1; }

            document.querySelectorAll('#nbh-toolbar .nbh-sort-btn').forEach(function (b) {
                b.classList.remove('asc','desc');
                b.querySelector('.sort-arrow').textContent = '';
            });
            btn.classList.add(sortDir === 1 ? 'asc' : 'desc');
            btn.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
            render();
        });
    });

    /* Search */
    document.getElementById('nbh-search').addEventListener('input', function () {
        searchQ = this.value.trim().toLowerCase();
        render();
    });

    /* Initial render — default sort by city A→Z */
    var cityBtn = document.querySelector('#nbh-toolbar .nbh-sort-btn[data-key="city"]');
    if (cityBtn) {
        cityBtn.classList.add('asc');
        cityBtn.querySelector('.sort-arrow').textContent = '↑';
    }
    render();
})();
</script>
</body>
</html>
